name: Build and Publish Runtime Image

on:
  schedule:
    - cron: "0 3 1 * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version tag, e.g. v1.0.1"
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/stemmechanics/stemmechanics-web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Docker repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current latest digest
        id: old
        run: |
          OLD_DIGEST=$(docker buildx imagetools inspect "$IMAGE_NAME:latest" --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || true)
          echo "digest=$OLD_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Work out version tag
        id: version
        run: |
          git fetch --tags

          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            LAST_TAG=$(git tag --list "v*.*.*" --sort=-v:refname | head -n 1)

            if [ -z "$LAST_TAG" ]; then
              VERSION="v1.0.0"
            else
              BASE="${LAST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
              PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push latest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          pull: true
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get new latest digest
        id: new
        run: |
          NEW_DIGEST=$(docker buildx imagetools inspect "$IMAGE_NAME:latest" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$NEW_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Publish version tag if changed
        if: steps.old.outputs.digest != steps.new.outputs.digest || github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          docker buildx imagetools create \
            -t "$IMAGE_NAME:$VERSION" \
            "$IMAGE_NAME:latest"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag "$VERSION"
          git push origin "$VERSION"
